services:
  napcat-message-archiver-parser:
    image: sliots/napcat-message-archiver-parser:${IMAGE_TAG:-latest}
    container_name: napcat-message-archiver-parser
    hostname: napcat-message-archiver-parser
    restart: unless-stopped

    extra_hosts:
      - host.docker.internal:host-gateway

    environment:
      TZ: ${TZ:-Asia/Shanghai}

      # 数据库
      POSTGRES_HOST: ${POSTGRES_HOST:-172.17.0.1}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

      # 轮询与清理
      POLL_INTERVAL: ${POLL_INTERVAL:-10}
      BATCH_SIZE: ${BATCH_SIZE:-50}
      CLEANUP_INTERVAL: ${CLEANUP_INTERVAL:-3600}
      RETENTION_HOURS: ${RETENTION_HOURS:-12}

      # 保护规则（可选）
      PROTECTED_USER_ID: ${PROTECTED_USER_ID:-}
      PROTECTED_GROUP_IDS: ${PROTECTED_GROUP_IDS:-}

    labels:
      com.centurylinklabs.watchtower.enable: ${WATCHTOWER_ENABLE:-true}
